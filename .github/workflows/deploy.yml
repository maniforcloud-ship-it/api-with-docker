name: Build and Push to AWS ECR

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1                        # Change to your region
  ECR_REPOSITORY: node-ecr-api                 # Change to your ECR repo name

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configure AWS credentials (stored as GitHub Secrets)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 3. Log in to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Create ECR repository if it doesn't exist
      - name: Create ECR repository if not exists
        run: |
          aws ecr describe-repositories  --repository-names $ECR_REPOSITORY --region $AWS_REGION 2>/dev/null ||  aws ecr create-repository  --repository-name $ECR_REPOSITORY    --region $AWS_REGION
          echo "✅ ECR repository '$ECR_REPOSITORY' is ready"

      # 5. Build, tag, and push Docker image
      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG  $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # 6. Print the image URI
      - name: Print image URI
        run: |
          echo "✅ Image pushed: ${{ steps.build-image.outputs.image }}"