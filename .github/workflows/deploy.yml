name: Build and Deploy to AWS ECS Fargate

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: node-ecr-api
  ECS_CLUSTER: ecs-fargate-cluster1
  ECS_SERVICE: node-api-service
  CONTAINER_NAME: node-api
  TASK_FAMILY: node-api-task

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    name: Build & Deploy to Fargate
    runs-on: ubuntu-latest
    needs: test

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 3. Get AWS account ID
      - name: Get AWS Account ID
        id: account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "✅ Account ID: $ACCOUNT_ID"

      # 4. Create ECS service-linked role if not exists
      - name: Create ECS service-linked role if not exists
        run: |
          aws iam get-role --role-name AWSServiceRoleForECS > /dev/null 2>&1 ||           aws iam create-service-linked-role --aws-service-name ecs.amazonaws.com > /dev/null 2>&1 || true
          echo "✅ AWSServiceRoleForECS ready"

      # 5. Create ecsTaskExecutionRole if not exists
      - name: Create ECS task execution role if not exists
        run: |
          aws iam get-role --role-name ecsTaskExecutionRole 2>/dev/null || \
          (
            aws iam create-role \
              --role-name ecsTaskExecutionRole \
              --assume-role-policy-document '{
                "Version": "2012-10-17",
                "Statement": [{
                  "Effect": "Allow",
                  "Principal": { "Service": "ecs-tasks.amazonaws.com" },
                  "Action": "sts:AssumeRole"
                }]
              }' && \
            aws iam attach-role-policy \
              --role-name ecsTaskExecutionRole \
              --policy-arn arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
          )
          echo "✅ ecsTaskExecutionRole ready"

      # 6. Create ECR repo if not exists
      - name: Create ECR repository if not exists
        run: |
          aws ecr describe-repositories \
            --repository-names $ECR_REPOSITORY \
            --region $AWS_REGION 2>/dev/null || \
          aws ecr create-repository \
            --repository-name $ECR_REPOSITORY \
            --region $AWS_REGION
          echo "✅ ECR repository ready"

      # 7. Create ECS cluster if not exists
      - name: Create ECS cluster if not exists
        run: |
          CLUSTER_STATUS=$(aws ecs describe-clusters \
            --clusters $ECS_CLUSTER \
            --region $AWS_REGION \
            --query "clusters[0].status" \
            --output text 2>/dev/null)

          if [ "$CLUSTER_STATUS" != "ACTIVE" ]; then
            aws ecs create-cluster \
              --cluster-name $ECS_CLUSTER \
              --capacity-providers FARGATE \
              --region $AWS_REGION
            echo "✅ ECS cluster created"
          else
            echo "✅ ECS cluster already exists"
          fi

      # 8. Create CloudWatch log group if not exists
      - name: Create CloudWatch log group if not exists
        run: |
          aws logs create-log-group \
            --log-group-name /ecs/node-api \
            --region $AWS_REGION 2>/dev/null || true
          echo "✅ CloudWatch log group ready"

      # 9. Login to ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 10. Build & push Docker image
      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                     $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "✅ Image pushed"

      # 11. Register ECS task definition dynamically (no static file needed)
      - name: Register ECS task definition
        id: task-def
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          ACCOUNT_ID: ${{ steps.account.outputs.id }}
        run: |
          cat > /tmp/task-def.json <<EOF
          {
            "family": "$TASK_FAMILY",
            "networkMode": "awsvpc",
            "requiresCompatibilities": ["FARGATE"],
            "cpu": "256",
            "memory": "512",
            "executionRoleArn": "arn:aws:iam::$ACCOUNT_ID:role/ecsTaskExecutionRole",
            "containerDefinitions": [
              {
                "name": "$CONTAINER_NAME",
                "image": "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG",
                "portMappings": [
                  {
                    "containerPort": 3000,
                    "protocol": "tcp"
                  }
                ],
                "essential": true,
                "logConfiguration": {
                  "logDriver": "awslogs",
                  "options": {
                    "awslogs-group": "/ecs/node-api",
                    "awslogs-region": "$AWS_REGION",
                    "awslogs-stream-prefix": "ecs"
                  }
                },
                "healthCheck": {
                  "command": ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"],
                  "interval": 30,
                  "timeout": 5,
                  "retries": 3,
                  "startPeriod": 10
                }
              }
            ]
          }
          EOF

          TASK_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/task-def.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          echo "task_arn=$TASK_ARN" >> $GITHUB_OUTPUT
          echo "✅ Task definition registered: $TASK_ARN"

      # 12. Create ECS service if not exists, else update it
      - name: Create or update ECS service
        env:
          TASK_ARN: ${{ steps.task-def.outputs.task_arn }}
        run: |
          SERVICE_STATUS=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --region $AWS_REGION \
            --query "services[0].status" \
            --output text 2>/dev/null)

          if [ "$SERVICE_STATUS" == "ACTIVE" ]; then
            # Service exists — update it
            aws ecs update-service \
              --cluster $ECS_CLUSTER \
              --service $ECS_SERVICE \
              --task-definition $TASK_ARN \
              --region $AWS_REGION
            echo "✅ ECS service updated"
          else
            # Get default VPC and subnets
            VPC_ID=$(aws ec2 describe-vpcs \
              --filters "Name=isDefault,Values=true" \
              --query "Vpcs[0].VpcId" \
              --output text)

            SUBNET_IDS=$(aws ec2 describe-subnets \
              --filters "Name=vpc-id,Values=$VPC_ID" \
              --query "Subnets[*].SubnetId" \
              --output text | tr '\t' ',')

            SG_ID=$(aws ec2 describe-security-groups \
              --filters "Name=vpc-id,Values=$VPC_ID" "Name=group-name,Values=default" \
              --query "SecurityGroups[0].GroupId" \
              --output text)

            # Create service
            aws ecs create-service \
              --cluster $ECS_CLUSTER \
              --service-name $ECS_SERVICE \
              --task-definition $TASK_ARN \
              --desired-count 1 \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={subnets=[$SUBNET_IDS],securityGroups=[$SG_ID],assignPublicIp=ENABLED}" \
              --region $AWS_REGION
            echo "✅ ECS service created"
          fi

      # 13. Wait for service to stabilize
      - name: Wait for deployment to complete
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --region $AWS_REGION
          echo "🚀 Deployed successfully to ECS Fargate!"